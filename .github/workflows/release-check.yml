name: release-check

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run release audit
        run: |
          chmod +x scripts/release_check.sh
          ./scripts/release_check.sh
